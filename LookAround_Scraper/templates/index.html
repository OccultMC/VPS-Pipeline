<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LookAround Debug Scraper</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --bg:#111; --panel:#1c1c1c; --fg:#eee; --muted:#888; --accent:#4ea1ff; --err:#ff5c5c; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--fg); font-family:system-ui,sans-serif; font-size:13px; }
  #app { display:grid; grid-template-columns: 320px 1fr; height:100vh; }
  #sidebar { padding:16px; overflow:auto; border-right:1px solid #222; background:var(--panel); }
  #map { height:100%; }
  h1 { font-size:14px; margin:0 0 12px; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); }
  label { display:block; font-size:11px; color:var(--muted); margin:12px 0 4px; text-transform:uppercase; letter-spacing:0.05em; }
  input[type=file], input[type=number], select { width:100%; background:#000; color:var(--fg); border:1px solid #333; padding:6px 8px; font-size:12px; }
  .progress { margin-top:16px; padding:8px; background:#000; border:1px solid #333; min-height:32px; font-family:ui-monospace,monospace; font-size:11px; white-space:pre-wrap; }
  .gallery { margin-top:12px; display:grid; grid-template-columns: repeat(2, 1fr); gap:6px; }
  .gallery .face { background:#000; border:1px solid #333; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:10px; overflow:hidden; }
  .gallery .face img { width:100%; height:100%; object-fit:cover; }
  .meta { margin-top:12px; font-family:ui-monospace,monospace; font-size:11px; color:var(--muted); }
  .meta b { color:var(--fg); }
  a.csv-link { color:var(--accent); display:inline-block; margin-top:8px; }
  .err { color:var(--err); }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h1>LookAround Debug</h1>
    <label>Shape file</label>
    <input type="file" id="shape-file" accept=".geojson,.json,.shp,.dbf,.shx,.prj,.zip,.kml,.gpkg" multiple>
    <label>Click mode</label>
    <select id="click-mode" style="width:100%; background:#000; color:var(--fg); border:1px solid #333; padding:6px 8px; font-size:12px;">
      <option value="single">Single pano (click → scrape one)</option>
      <option value="all">All panos in shape → CSV</option>
    </select>
    <label>Bulk stride (1=keep all, 3=keep every 3rd)</label>
    <input type="number" id="stride" value="3" min="1" max="20">
    <label>Fuzzy dedupe radius (m, 0=off, 13.33=~90% of pano spacing)</label>
    <input type="number" id="dedupe-radius" value="13.33" min="0" max="200" step="0.5">
    <label>Zoom (0=full, 7=lowest) — single-pano only</label>
    <input type="number" id="zoom" value="0" min="0" max="7">
    <div class="progress" id="progress">click a polygon to scrape one panorama</div>
    <div class="meta" id="meta"></div>
    <div class="gallery" id="gallery">
      <div class="face" data-name="back">back</div>
      <div class="face" data-name="left">left</div>
      <div class="face" data-name="front">front</div>
      <div class="face" data-name="right">right</div>
      <div class="face" data-name="top">top</div>
      <div class="face" data-name="bottom">bottom</div>
    </div>
    <label>Stitch overlap (% of face width)</label>
    <input type="number" id="overlap-pct" value="3" min="0" max="50" step="0.5">
    <button id="stitch-btn" style="margin-top:12px; width:100%; padding:8px; background:#4ea1ff; color:#000; border:0; font-weight:600; cursor:pointer; display:none;">Stitch panorama</button>
    <button id="equirect-btn" style="margin-top:8px; width:100%; padding:8px; background:#7755ff; color:#fff; border:0; font-weight:600; cursor:pointer; display:none;">Build equirect + open 360 viewer</button>
    <div id="stitched-wrap" style="margin-top:12px; display:none;">
      <label style="margin-top:0">Stitched (back→left→front→right)</label>
      <a id="stitched-link" href="#" target="_blank"><img id="stitched-img" style="width:100%; border:1px solid #333;"></a>
    </div>
    <div id="equirect-wrap" style="margin-top:12px; display:none;">
      <label style="margin-top:0">Equirectangular (2:1 with black bars)</label>
      <a id="equirect-link" href="#" target="_blank"><img id="equirect-img" style="width:100%; border:1px solid #333;"></a>
      <a id="viewer-link" href="#" target="_blank" style="display:block; margin-top:6px; color:#7755ff;">Open in 360 viewer →</a>
    </div>
    <a class="csv-link" id="csv-link" href="#" style="display:none">download meta.csv</a>
    <div id="bulk-wrap" style="margin-top:12px; display:none; padding:8px; background:#000; border:1px solid #333;">
      <div style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em;">Bulk scrape</div>
      <div id="bulk-summary" style="margin-top:4px; font-family:ui-monospace,monospace; font-size:12px;"></div>
      <a id="bulk-csv-link" href="#" style="color:var(--accent); display:inline-block; margin-top:6px;" download>download CSV →</a>
    </div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const sessionId = crypto.randomUUID();
  const socket = io({ query: { session_id: sessionId } });
  const map = L.map('map').setView([37.7749, -122.4194], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
    attribution: '&copy; OSM &copy; CARTO', maxZoom: 19
  }).addTo(map);

  const progressEl = document.getElementById('progress');
  const metaEl = document.getElementById('meta');
  const csvLink = document.getElementById('csv-link');
  const galleryFaces = {};
  document.querySelectorAll('#gallery .face').forEach(el => galleryFaces[el.dataset.name] = el);

  let shapesLayer = null;
  let pointsLayer = null;

  function setProgress(text, cls = '') {
    progressEl.textContent = text;
    progressEl.className = 'progress ' + cls;
  }

  function clearGallery() {
    Object.entries(galleryFaces).forEach(([name, el]) => {
      el.innerHTML = name;
    });
    metaEl.innerHTML = '';
    csvLink.style.display = 'none';
    document.getElementById('stitch-btn').style.display = 'none';
    document.getElementById('stitched-wrap').style.display = 'none';
  }

  let currentPanoId = null;
  document.getElementById('stitch-btn').addEventListener('click', () => {
    if (!currentPanoId) return;
    setProgress('stitching...');
    const pct = parseFloat(document.getElementById('overlap-pct').value) || 3.0;
    socket.emit('stitch_pano', { session_id: sessionId, pano_id: currentPanoId, overlap_pct: pct });
  });

  document.getElementById('equirect-btn').addEventListener('click', () => {
    if (!currentPanoId) return;
    setProgress('building equirect...');
    socket.emit('make_equirect', { session_id: sessionId, pano_id: currentPanoId });
  });

  function attachClickHandler(layer) {
    layer.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      const geom = layer.feature && layer.feature.geometry;
      if (!geom) return;
      let ring;
      if (geom.type === 'Polygon') {
        ring = geom.coordinates[0];
      } else if (geom.type === 'MultiPolygon') {
        ring = geom.coordinates[0][0];
      } else {
        setProgress('unsupported geometry: ' + geom.type, 'err');
        return;
      }
      const mode = document.getElementById('click-mode').value;
      const props = (layer.feature && layer.feature.properties) || {};
      if (mode === 'all') {
        clearPoints();
        document.getElementById('bulk-wrap').style.display = 'none';
        const stride = parseInt(document.getElementById('stride').value, 10) || 1;
        const dedupe = parseFloat(document.getElementById('dedupe-radius').value) || 0;
        setProgress('enumerating panos (stride ' + stride +
                    ', dedupe ' + dedupe + 'm)...');
        socket.emit('scrape_polygon_all', {
          session_id: sessionId,
          coords: ring,
          country_code: props.country_code || '',
          address_label: props.address_label || props.name || '',
          stride: stride,
          dedupe_radius_m: dedupe,
        });
      } else {
        clearGallery();
        setProgress('submitting polygon (' + ring.length + ' vertices)...');
        socket.emit('scrape_polygon', {
          session_id: sessionId,
          coords: ring,
          zoom: parseInt(document.getElementById('zoom').value, 10) || 0,
        });
      }
    });
  }

  function clearPoints() {
    if (pointsLayer) { map.removeLayer(pointsLayer); pointsLayer = null; }
  }

  function renderPoints(points) {
    clearPoints();
    if (!points.length) return;
    pointsLayer = L.layerGroup();
    for (const p of points) {
      L.circleMarker([p.lat, p.lon], {
        radius: 2, color: '#7755ff', weight: 1, fillColor: '#7755ff', fillOpacity: 0.7,
      }).bindTooltip(p.id, {sticky: true}).addTo(pointsLayer);
    }
    pointsLayer.addTo(map);
  }

  document.getElementById('shape-file').addEventListener('change', async (e) => {
    const files = e.target.files;
    if (!files.length) return;
    const fd = new FormData();
    for (const f of files) fd.append('file', f);
    fd.append('session_id', sessionId);
    setProgress('uploading shape...');
    const res = await fetch('/api/load-shapes', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.error) { setProgress('shape load error: ' + data.error, 'err'); return; }
    if (shapesLayer) map.removeLayer(shapesLayer);
    shapesLayer = L.geoJSON(data.geojson, {
      style: { color: '#4ea1ff', weight: 1, fillOpacity: 0.15 },
      onEachFeature: (feature, layer) => attachClickHandler(layer),
    }).addTo(map);
    map.fitBounds(shapesLayer.getBounds());
    setProgress('loaded ' + data.filename + ' — click a polygon');
  });

  socket.on('progress', (p) => {
    if (p.step === 'finding-tile') setProgress('finding coverage tile...');
    else if (p.step === 'pano-selected') setProgress('pano ' + p.pano_id + ' @ ' + p.lat.toFixed(5) + ',' + p.lon.toFixed(5));
    else if (p.step === 'face') setProgress('face ' + p.i + '/' + p.total + ' (' + p.name + ')...');
    else if (p.step === 'tile') setProgress('tile ' + p.i + '/' + p.total + ' — ' + p.panos_so_far + ' panos so far');
    else if (p.step === 'dedupe') setProgress('dedupe ' + p.before + ' → ' + p.after + ' (' + p.radius_m + 'm)');
  });

  socket.on('scrape_all_done', (r) => {
    setProgress('bulk done — ' + r.count + ' panos (stride ' + (r.stride || 1) + ')');
    renderPoints(r.points);
    const strideTxt = (r.stride && r.stride > 1) ? ' (1 of every ' + r.stride + ' kept)' : '';
    document.getElementById('bulk-summary').textContent =
      r.count + ' panoramas after pruning' + strideTxt;
    const link = document.getElementById('bulk-csv-link');
    link.href = r.csv_url;
    link.textContent = 'download ' + r.csv_name + ' →';
    document.getElementById('bulk-wrap').style.display = 'block';
  });

  socket.on('scrape_all_error', (e) => setProgress('bulk error: ' + e.message, 'err'));

  socket.on('scrape_done', (r) => {
    setProgress('done — pano ' + r.pano_id);
    metaEl.innerHTML = '<b>pano:</b> ' + r.pano_id + '<br><b>lat,lon:</b> ' + r.lat.toFixed(6) + ', ' + r.lon.toFixed(6) +
      '<br><b>captured:</b> ' + r.capture_date + '<br><b>heading:</b> ' + r.heading.toFixed(3);
    const names = ['back','left','front','right','top','bottom'];
    r.face_urls.forEach((url, i) => {
      const el = galleryFaces[names[i]];
      if (!el) return;
      el.innerHTML = '';
      const img = document.createElement('img');
      img.src = url; img.alt = names[i];
      el.appendChild(img);
    });
    csvLink.href = r.csv_url;
    csvLink.style.display = 'inline-block';
    currentPanoId = r.pano_id;
    document.getElementById('stitch-btn').style.display = 'block';
  });

  socket.on('scrape_error', (e) => setProgress('error: ' + e.message, 'err'));

  socket.on('stitch_done', (r) => {
    setProgress('stitched — pano ' + r.pano_id);
    const img = document.getElementById('stitched-img');
    const link = document.getElementById('stitched-link');
    img.src = r.stitched_url;
    link.href = r.stitched_url;
    document.getElementById('stitched-wrap').style.display = 'block';
    document.getElementById('equirect-btn').style.display = 'block';
  });

  socket.on('stitch_error', (e) => setProgress('stitch error: ' + e.message, 'err'));

  socket.on('equirect_done', (r) => {
    setProgress('equirect ready (' + r.width + 'x' + r.height + ')');
    const img = document.getElementById('equirect-img');
    img.src = r.equirect_url;
    document.getElementById('equirect-link').href = r.equirect_url;
    document.getElementById('viewer-link').href = r.viewer_url;
    document.getElementById('equirect-wrap').style.display = 'block';
    // auto-pop the viewer in a new tab
    window.open(r.viewer_url, '_blank');
  });

  socket.on('equirect_error', (e) => setProgress('equirect error: ' + e.message, 'err'));
</script>
</body>
</html>
