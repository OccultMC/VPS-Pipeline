name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'Scraper/VPR_Pipeline/**'
      - 'Scraper/VPR_Builder/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  R2_ENDPOINT: https://ce06ef4aff61c60c4e503993576b023c.r2.cloudflarestorage.com

jobs:
  build-pipeline:
    name: Build VPR Pipeline (GPU)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Download MegaLoc model from R2
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        aws s3 cp \
          "s3://streetview-data/Models/MegaLoc/model.safetensors" \
          Scraper/VPR_Pipeline/model.safetensors \
          --endpoint-url "${{ env.R2_ENDPOINT }}"
        ls -lh Scraper/VPR_Pipeline/model.safetensors

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Pipeline image
      uses: docker/build-push-action@v5
      with:
        context: Scraper/VPR_Pipeline/
        file: Scraper/VPR_Pipeline/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vpr-pipeline:latest
        cache-from: type=gha,scope=pipeline
        cache-to: type=gha,mode=max,scope=pipeline

  build-builder:
    name: Build VPR Builder (CPU)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Builder image
      uses: docker/build-push-action@v5
      with:
        context: Scraper/VPR_Builder/
        file: Scraper/VPR_Builder/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vpr-builder:latest
        cache-from: type=gha,scope=builder
        cache-to: type=gha,mode=max,scope=builder
