name: Build and Push VPS Pipeline Image

on:
  push:
    branches: [ "main" ]
    paths:
      - '**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Two variants from the same checkout:
    #   - default: PyTorch 2.6 / CUDA 12.4 → broad host compat, NO sm_120
    #   - blackwell: PyTorch 2.7.1 / CUDA 12.8 → sm_120 native (5060/70/80/90,
    #     RTX PRO 4000-6000 Blackwell). Tagged `:blackwell`. Scraper dispatches
    #     per-offer based on GPU name.
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile
            tag: latest
          - dockerfile: Dockerfile.blackwell
            tag: blackwell

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ matrix.tag }}

    - name: Download MegaLoc model from R2
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        mkdir -p models/megaloc
        aws s3 cp \
          "s3://streetview-data/Models/MegaLoc/model.safetensors" \
          models/megaloc/model.safetensors \
          --endpoint-url "https://ce06ef4aff61c60c4e503993576b023c.r2.cloudflarestorage.com"
        ls -lh models/megaloc/model.safetensors

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push ${{ matrix.tag }}
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.tag }}
        cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
